<!DOCTYPE html>
<html lang="mn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нэвтрэх / Бүртгүүлэх — Parkiiin</title>
  <meta name="description" content="Parkiiin зогсоолын платформд нэвтэрч эсвэл шинээр бүртгүүлнэ үү.">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

  <!-- ── TOP NAV ───────────────────────────────────────── -->
  <nav class="top-nav" id="topNav" aria-label="Үндсэн навигац">
    <a class="nav-logo" href="../parkiiin.html">Parkiiin</a>
    <div class="nav-links" id="navLinks">
      <a class="nav-link" href="../parkiiin.html">Нүүр</a>
      <a class="nav-link" href="findPark.html">Зогсоол</a>
      <a class="nav-link" href="nearby_washing.html">Үйлчилгээ</a>
      <a class="nav-link" href="tips.html">Зөвлөмж</a>
    </div>
    <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Цэс нээх" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ── MOBILE MENU ──────────────────────────────────── -->
  <div class="mobile-menu" id="mobileMenu" role="navigation">
    <a class="nav-link" href="../parkiiin.html" onclick="closeMenu()">🏠 Нүүр</a>
    <a class="nav-link" href="findPark.html" onclick="closeMenu()">🅿️ Зогсоол</a>
    <a class="nav-link" href="nearby_washing.html" onclick="closeMenu()">🔧 Үйлчилгээ</a>
    <a class="nav-link" href="tips.html" onclick="closeMenu()">💡 Зөвлөмж</a>
  </div>

  <!-- ══════════════════════════════════════════════════════
       AUTH PAGE
  ══════════════════════════════════════════════════════════ -->
  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Logo + subtitle -->
      <div class="auth-logo" aria-label="Parkiiin нүүр хуудас руу буцах">
        <a href="../parkiiin.html" style="color:inherit;text-decoration:none;">Parkiiin</a>
      </div>
      <p class="auth-sub" id="authSubtitle">Тавтай морил! Нэвтэрч орно уу</p>

      <!-- Login / Signup tab switcher -->
      <div class="tab-sw" role="tablist" aria-label="Нэвтрэх эсвэл бүртгүүлэх">
        <button class="tab-b active" id="tab-login" role="tab" aria-selected="true"
          onclick="authSwitchTab('lf', this)">Нэвтрэх</button>
        <button class="tab-b" id="tab-signup" role="tab" aria-selected="false"
          onclick="authSwitchTab('sf', this)">Бүртгүүлэх</button>
      </div>

      <!-- ── Error / success alert strip ──────────────── -->
      <div class="auth-alert" id="authAlert" role="alert" aria-live="polite" style="display:none;"></div>

      <!-- ══════════════════════════════════════════════
           LOGIN FORM
      ══════════════════════════════════════════════════ -->
      <div id="lf" role="tabpanel" aria-labelledby="tab-login">
        <form class="auth-form" id="loginForm" onsubmit="authHandleLoginSubmit(event)" novalidate>

          <div class="form-g">
            <label class="form-l" for="login-email">Имэйл / Утасны дугаар</label>
            <input class="form-i" id="login-email" type="text" placeholder="example@mail.com" autocomplete="username"
              required oninput="clearAuthError()">
            <span class="form-err" id="login-email-err"></span>
          </div>

          <div class="form-g">
            <label class="form-l" for="login-password">Нууц үг</label>
            <div class="input-eye-wrap">
              <input class="form-i" id="login-password" type="password" placeholder="Нууц үгээ оруулна уу"
                autocomplete="current-password" required oninput="clearAuthError()">
              <button type="button" class="eye-btn" aria-label="Нууц үг харуулах / нуух"
                onclick="authTogglePassword('login-password', this)">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <span class="form-err" id="login-password-err"></span>
          </div>

          <a class="forgot" href="forget-password.html" id="forgot-link">Нууц үг мартсан?</a>

          <button type="submit" class="btn-full" id="login-submit-btn">Нэвтрэх</button>

          <div class="divider">эсвэл</div>

          <div class="social-btns">
            <button type="button" class="social-btn" id="google-login-btn" onclick="socialLogin('google')">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"
                  fill="#4285F4" />
                <path
                  d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"
                  fill="#34A853" />
                <path
                  d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"
                  fill="#FBBC05" />
                <path
                  d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"
                  fill="#EA4335" />
              </svg>
              Google
            </button>
            <button type="button" class="social-btn" id="apple-login-btn" onclick="socialLogin('apple')">
              <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true" fill="currentColor">
                <path
                  d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.8-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z" />
              </svg>
              Apple
            </button>
          </div>

          <p class="auth-sw">Бүртгэлгүй юу?
            <a href="#" onclick="authSwitchTab('sf', document.getElementById('tab-signup')); return false;">Бүртгүүлэх</a>
          </p>
        </form>
      </div><!-- /#lf -->

      <!-- ══════════════════════════════════════════════
           SIGNUP FORM
      ══════════════════════════════════════════════════ -->
      <div id="sf" style="display:none" role="tabpanel" aria-labelledby="tab-signup">

        <!-- Driver / Parking owner sub-tabs -->
        <div class="tab-sw tab-sw--inner" role="tablist" aria-label="Хэрэглэгчийн төрөл">
          <button class="tab-b active" id="tab-driver" role="tab" onclick="authSwitchUserType('driver', this)">Жолооч</button>
          <button class="tab-b" id="tab-owner" role="tab" onclick="authSwitchUserType('owner', this)">Зогсоол</button>
        </div>

        <form class="auth-form" id="signupForm" onsubmit="authHandleSignupSubmit(event)" novalidate>

          <!-- Row: lastname + firstname -->
          <div class="form-row-2">
            <div class="form-g">
              <label class="form-l" for="signup-lastname">Овог</label>
              <input class="form-i" id="signup-lastname" type="text" placeholder="Овог" autocomplete="family-name"
                required oninput="validateField(this)">
              <span class="form-err" id="signup-lastname-err"></span>
            </div>
            <div class="form-g">
              <label class="form-l" for="signup-firstname">Нэр</label>
              <input class="form-i" id="signup-firstname" type="text" placeholder="Нэр" autocomplete="given-name"
                required oninput="validateField(this)">
              <span class="form-err" id="signup-firstname-err"></span>
            </div>
          </div>

          <div class="form-g">
            <label class="form-l" for="signup-phone">Утасны дугаар</label>
            <input class="form-i" id="signup-phone" type="tel" placeholder="+976 XXXX-XXXX" autocomplete="tel" required
              oninput="validatePhone(this)">
            <span class="form-err" id="signup-phone-err"></span>
          </div>

          <div class="form-g">
            <label class="form-l" for="signup-email">Имэйл хаяг</label>
            <input class="form-i" id="signup-email" type="email" placeholder="example@mail.com" autocomplete="email"
              required oninput="validateEmail(this)">
            <span class="form-err" id="signup-email-err"></span>
          </div>

          <div class="form-g">
            <label class="form-l" for="signup-password">Нууц үг</label>
            <div class="input-eye-wrap">
              <input class="form-i" id="signup-password" type="password" placeholder="8+ тэмдэгт"
                autocomplete="new-password" required oninput="onPasswordInput(this)">
              <button type="button" class="eye-btn" aria-label="Нууц үг харуулах"
                onclick="authTogglePassword('signup-password', this)">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <!-- Password strength meter -->
            <div class="pw-strength-wrap" id="pwStrengthWrap" style="display:none">
              <div class="pw-strength-bar">
                <div class="pw-strength-fill" id="pwStrengthFill"></div>
              </div>
              <span class="pw-strength-lbl" id="pwStrengthLbl"></span>
            </div>
            <span class="form-err" id="signup-password-err"></span>
          </div>

          <div class="form-g">
            <label class="form-l" for="signup-password2">Нууц үг давтах</label>
            <div class="input-eye-wrap">
              <input class="form-i" id="signup-password2" type="password" placeholder="Нууц үгийг дахин оруулна уу"
                autocomplete="new-password" required oninput="validatePassword2(this)">
              <button type="button" class="eye-btn" aria-label="Нууц үг харуулах"
                onclick="authTogglePassword('signup-password2', this)">
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                  <circle cx="12" cy="12" r="3" />
                </svg>
              </button>
            </div>
            <span class="form-err" id="signup-password2-err"></span>
          </div>

          <!-- Terms checkbox -->
          <div class="check-row">
            <input type="checkbox" id="terms-check" required>
            <label for="terms-check">
              Би <a href="#">Үйлчилгээний нөхцөл</a> болон
              <a href="#">Нууцлалын бодлого</a>-г зөвшөөрч байна.
            </label>
          </div>

          <button type="submit" class="btn-full" id="signup-submit-btn">Бүртгүүлэх</button>

          <p class="auth-sw">Бүртгэлтэй юу?
            <a href="#" onclick="authSwitchTab('lf', document.getElementById('tab-login')); return false;">Нэвтрэх</a>
          </p>
        </form>
      </div><!-- /#sf -->

    </div><!-- /auth-card -->
  </div><!-- /auth-wrap -->

  <script src="../js/main.js"></script>
</body>

</html>
