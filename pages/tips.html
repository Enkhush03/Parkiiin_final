<!DOCTYPE html>
<html lang="mn">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Parking Tips — Parkiiin</title>
  <meta name="description" content="Parkiiin зогсоолын зөвлөмж — аюулгүй, зөв зогсоолд байрлуулах нийтлэл, видео.">
  <link
    href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>

<body>

  <!-- ── TOP NAV ───────────────────────────────────────── -->
  <nav class="top-nav" id="topNav" aria-label="Үндсэн навигац">
    <a class="nav-logo" href="../parkiiin.html">Parkiiin</a>
    <div class="nav-links" id="navLinks">
      <a class="nav-link" href="../parkiiin.html">Нүүр</a>
      <a class="nav-link" href="findPark.html">Зогсоол</a>
      <a class="nav-link" href="nearby_washing.html">Үйлчилгээ</a>
      <a class="nav-link active" href="tips.html">Зөвлөмж</a>
      <a class="nav-link" href="profile.html">Профайл</a>
    </div>
    <button class="hamburger" id="hamburgerBtn" onclick="toggleMenu()" aria-label="Цэс нээх" aria-expanded="false">
      <span></span><span></span><span></span>
    </button>
  </nav>

  <!-- ── MOBILE MENU ──────────────────────────────────── -->
  <div class="mobile-menu" id="mobileMenu" role="navigation">
    <a class="nav-link" href="../parkiiin.html" onclick="closeMenu()">🏠 Нүүр</a>
    <a class="nav-link" href="findPark.html" onclick="closeMenu()">🅿️ Зогсоол</a>
    <a class="nav-link" href="nearby_washing.html" onclick="closeMenu()">🔧 Үйлчилгээ</a>
    <a class="nav-link active" href="tips.html" onclick="closeMenu()">💡 Зөвлөмж</a>
    <a class="nav-link" href="profile.html" onclick="closeMenu()">👤 Профайл</a>
  </div>

  <!-- ══════════════════════════════════════════════════════
       TIPS PAGE  — exact design from parkiiin.html #tips
  ══════════════════════════════════════════════════════════ -->
  <div class="page-header" style="padding-top:64px;">
    <div class="page-header-inner">
      <h1>Parking Tips</h1>
      <p>Зогсоолтой холбоотой зөвлөмж, мэдээлэл</p>
    </div>
  </div>

  <main class="tips-content" style="padding-bottom:100px;">

    <!-- ── Search ────────────────────────────────────────── -->
    <div class="search-bar" style="margin-bottom:18px;" role="search">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      <input type="text" id="tipsSearchInput" placeholder="Хайх..." oninput="tipsSearch(this.value)" autocomplete="off"
        aria-label="Зөвлөмж хайх">
    </div>

    <!-- ── Content type tabs: Нийтлал / Видео ──────────── -->
    <div class="tips-tabs" role="tablist" aria-label="Контентын төрөл">
      <button class="tips-tab active" id="tab-articles" role="tab" aria-selected="true"
        aria-controls="tipsArticlesPanel" onclick="switchTipsTab(this,'tipsArticlesPanel','tipsVideosPanel')">Нийтлэл</button>
      <button class="tips-tab" id="tab-videos" role="tab" aria-selected="false" aria-controls="tipsVideosPanel"
        onclick="switchTipsTab(this,'tipsVideosPanel','tipsArticlesPanel')">Видео</button>
    </div>

    <!-- ── Category filter pills ─────────────────────────── -->
    <div class="tips-cat-row" role="group" aria-label="Ангилал шүүлтүүр">
      <button class="tips-cat-pill active" onclick="filterTipsByCategory(this,'all')" data-cat="all">Бүгд</button>
      <button class="tips-cat-pill" onclick="filterTipsByCategory(this,'safety')" data-cat="safety">Аюулгүй байдал</button>
      <button class="tips-cat-pill" onclick="filterTipsByCategory(this,'signs')" data-cat="signs">Тэмдэг</button>
      <button class="tips-cat-pill" onclick="filterTipsByCategory(this,'eco')" data-cat="eco">Эко</button>
      <button class="tips-cat-pill" onclick="filterTipsByCategory(this,'night')" data-cat="night">Шөнийн</button>
    </div>

    <!-- ════════════════════════════════════════════════════
         ARTICLES PANEL
    ════════════════════════════════════════════════════════ -->
    <div id="tipsArticlesPanel" role="tabpanel" aria-labelledby="tab-articles">

      <!-- Section header -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:18px;">
        <h3 style="font-size:15px;font-weight:700;">Онцлох нийтлэлүүд</h3>
        <a href="#" style="color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;">Бүгдийг үзэх →</a>
      </div>

      <!-- JS-ээс динамикаар үүснэ (tips.js → TIPS_ARTICLES) -->
      <div id="articlesList"></div>

    </div><!-- /tipsArticlesPanel -->

    <!-- ════════════════════════════════════════════════════
         VIDEOS PANEL  (hidden by default)
    ════════════════════════════════════════════════════════ -->
    <div id="tipsVideosPanel" style="display:none;" role="tabpanel" aria-labelledby="tab-videos">

      <!-- Section header — from parkiiin.html -->
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;margin-top:18px;">
        <h3 style="font-size:15px;font-weight:700;">Сүүлийн үеийн видео</h3>
        <a href="#" style="color:var(--primary);font-size:13px;font-weight:600;cursor:pointer;">Бүгдийг үзэх →</a>
      </div>

      <!-- JS-ээс динамикаар үүснэ (tips.js → TIPS_VIDEOS) -->
      <div id="videosList" class="video-row" role="list" aria-label="Видео жагсаалт"></div>

      <div style="margin-top:20px;">
        <h3 style="font-size:15px;font-weight:700;margin-bottom:12px;">Онцлох видео</h3>
        <div id="featuredVideo"></div>
      </div>

    </div><!-- /tipsVideosPanel -->

  </main>

  <!-- ── BOTTOM NAV ────────────────────────────────────── -->
  <nav class="bottom-nav" id="bottomNav" aria-label="Доод навигац">
    <a class="bottom-nav-item" href="../parkiiin.html" aria-label="Нүүр">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z" />
        <polyline points="9 22 9 12 15 12 15 22" />
      </svg>
      Нүүр
    </a>
    <a class="bottom-nav-item" href="findPark.html" aria-label="Хайх">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="11" cy="11" r="8" />
        <line x1="21" y1="21" x2="16.65" y2="16.65" />
      </svg>
      Хайх
    </a>
    <a class="bottom-nav-item" href="nearby_washing.html" aria-label="Үйлчилгээ">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <circle cx="12" cy="12" r="10" />
        <polyline points="12 6 12 12 16 14" />
      </svg>
      Үйлчилгээ
    </a>
    <a class="bottom-nav-item active" href="tips.html" aria-label="Зөвлөмж">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path
          d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z" />
      </svg>
      Зөвлөмж
    </a>
    <a class="bottom-nav-item" href="profile.html" aria-label="Профайл">
      <svg viewBox="0 0 24 24" aria-hidden="true">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
        <circle cx="12" cy="7" r="4" />
      </svg>
      Профайл
    </a>
  </nav>

  <!-- type="module" заасанаар браузер ES6 import/export-г дэмжинэ.
       tips.js нь tipsData.js-аас import хийдэг тул заавал module байх ёстой. -->
  <script src="../js/main.js"></script>
  <script type="module" src="../js/tips.js"></script>
</body>

</html>
