<!DOCTYPE html>
<html lang="mn">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Нууц үг сэргээх — Parkiiin</title>
  <meta name="description" content="Parkiiin — бүртгэлтэй имэйл эсвэл утасны дугаараараа нууц үгээ сэргээнэ үү.">
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../styles/main.css">
</head>
<body>

  <!-- AUTH WRAP ─────────────────────────────────────────── -->
  <div class="auth-wrap">
    <div class="auth-card">

      <!-- Icon badge -->
      <div class="forgot-icon-badge" aria-hidden="true">🔑</div>

      <!-- Heading -->
      <h1 class="auth-logo" style="font-size:22px; margin-bottom:6px;">Нууц үг мартсан уу?</h1>
      <p class="auth-sub">
        Бүртгэлтэй имэйл эсвэл утасны дугаараа оруулна уу.<br>
        Баталгаажуулах код илгээнэ.
      </p>

      <!-- Tab switcher: Email | Phone -->
      <div class="tab-sw" role="tablist" aria-label="Мэдээлэл оруулах арга">
        <button class="tab-b active"
                id="tab-email"
                role="tab"
                aria-selected="true"
                aria-controls="forgot-email-panel"
                onclick="forgotTab('email', this)">
          Имэйл хаяг
        </button>
        <button class="tab-b"
                id="tab-phone"
                role="tab"
                aria-selected="false"
                aria-controls="forgot-phone-panel"
                onclick="forgotTab('phone', this)">
          Утасны дугаар
        </button>
      </div>

      <!-- FORM ────────────────────────────────────────────── -->
      <form id="forgotForm" onsubmit="handleForgotPassword(event)" novalidate>

        <!-- Email panel -->
        <div id="forgot-email-panel" role="tabpanel" aria-labelledby="tab-email">
          <div class="form-g">
            <label class="form-l" for="forgot-email">Имэйл хаяг</label>
            <input
              class="form-i"
              id="forgot-email"
              type="email"
              placeholder="Жишээ: example@mail.com"
              autocomplete="email"
            >
          </div>
        </div>

        <!-- Phone panel (hidden by default) -->
        <div id="forgot-phone-panel" role="tabpanel" aria-labelledby="tab-phone" style="display:none;">
          <div class="form-g">
            <label class="form-l" for="forgot-phone">Утасны дугаар</label>
            <input
              class="form-i"
              id="forgot-phone"
              type="tel"
              placeholder="+976 XXXX-XXXX"
              autocomplete="tel"
            >
          </div>
        </div>

        <!-- Submit -->
        <button type="submit" class="btn-full" id="forgot-submit-btn">
          Код илгээх →
        </button>

      </form>

      <!-- Back to login -->
      <p class="auth-sw" style="margin-top:18px;">
        <a href="login.html" id="back-to-login-link">← Нэвтрэх хэсэг рүү буцах</a>
      </p>

      <!-- Watermark -->
      <p class="forgot-watermark">PARKIIIN</p>

    </div><!-- /auth-card -->
  </div><!-- /auth-wrap -->

  <script src="../js/main.js"></script>
</body>
</html>
